services:
  - type: web
    name: chatbot-cafe-api
    runtime: python
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: EMBED_MODEL
        value: text-embedding-004
      - key: CHAT_MODEL
        value: gemini-2.5-flash
      - key: EMBED_DIM
        value: "768"
      - key: ALLOWED_ORIGINS
        sync: false
